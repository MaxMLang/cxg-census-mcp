name: facet-refresh

on:
  schedule:
    - cron: "47 5 * * 2"   # Tuesdays 05:47 UTC
  workflow_dispatch:
    inputs:
      census_version:
        description: "Census version (default: stable)"
        default: "stable"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra census
      - name: Refresh facet catalog
        env:
          CXG_CENSUS_MCP_CENSUS_VERSION: ${{ github.event.inputs.census_version || 'stable' }}
        run: uv run python scripts/refresh_facet_catalog.py --write
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(facets): refresh facet catalog"
          title: "chore(facets): refresh facet catalog"
          branch: facet-refresh/${{ github.run_id }}
          body: |
            Automated facet catalog refresh.
            Review for unexpected schema drift before merging.
          labels: facets, automated
