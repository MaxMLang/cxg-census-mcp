name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Install dev deps
        run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run mypy src/cxg_census_mcp

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install with dev extras (no live deps)
        run: uv sync --extra dev
      - name: Run unit + integration tests
        env:
          CXG_CENSUS_MCP_MOCK_MODE: "1"
        run: uv run pytest -m "not live" --cov --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      - name: pip-audit
        # Audit the locked production dep tree, not the editable project itself.
        # Ignored CVEs (threat model + revisit conditions in SECURITY.md):
        #   CVE-2025-69872  diskcache 5.6.3 — local pickle deserialization, no upstream fix yet
        run: |
          uv export --no-dev --no-emit-project --format requirements-txt > _audit-reqs.txt
          uv run --with pip-audit pip-audit --strict -r _audit-reqs.txt \
            --ignore-vuln CVE-2025-69872

  validate-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run python scripts/validate_fixtures.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cxg-census-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
