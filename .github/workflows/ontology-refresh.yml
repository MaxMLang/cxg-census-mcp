name: ontology-refresh

on:
  schedule:
    - cron: "23 4 * * 1"   # Mondays 04:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - name: Refresh ontology hints
        run: uv run python scripts/refresh_ontology_hints.py
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(ontology): weekly hint refresh"
          title: "chore(ontology): weekly hint refresh"
          branch: ontology-refresh/${{ github.run_id }}
          body: |
            Automated weekly refresh of `src/cxg_census_mcp/data/ontology_hints.json`.
            Review the diff before merging — never auto-merge canonical-target changes.
          labels: ontology, automated
