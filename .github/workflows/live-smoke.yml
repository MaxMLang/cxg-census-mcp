name: live-smoke

on:
  schedule:
    - cron: "11 6 * * 3"   # Wednesdays 06:11 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra census
      - name: Run live E2E suite
        run: uv run pytest -m live -v
      - name: Open or update issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          # Idempotent: comment on the existing live-smoke issue if one is
          # open, otherwise create a fresh one. Avoids spamming a new issue
          # every Wednesday until someone notices.
          script: |
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'live-smoke',
              per_page: 1,
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body: `Another live-smoke failure: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `live-smoke failing`,
                body: `Weekly live-smoke run failed. Latest: ${runUrl}\n\nThis issue is reused by subsequent failures; close it once the underlying problem is fixed.`,
                labels: ['live-smoke', 'bug'],
              });
            }
